name: CI Back

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build et tests Maven
        run: mvn -B clean verify

      - name: Vérifier que l'image Docker build correctement
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false